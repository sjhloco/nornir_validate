route_table:
  vrf:
    show vrf interface:
      BLU:
        _mode: strict
        intf:
          list:
          - Vlan108
          - Vlan109
          - Vlan110
          - Vlan111
          - Vlan112
          - Vlan113
          - Vlan3001
          - loopback21
      AMB:
        _mode: strict
        intf:
          list:
          - Vlan3003
      default:
        _mode: strict
        intf:
          list:
          - Ethernet1/1
          - Ethernet1/2
          - loopback1
          - loopback2
          - Vlan1
  route_count:
    show ip route  summary | in VRF|Route:
      global: 21
    show ip route vrf BLU summary | in VRF|Route:
      BLU: 925
  route:
