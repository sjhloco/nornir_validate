          rtype: ospf-DC_UNDERLAY intra
          nh:
            _mode: strict
            list:
            - 192.168.2.33
            - 192.168.2.34
        192.168.12.8/29:
          rtype: direct
          nh: Vlan3101
        192.168.12.9/32:
          rtype: local
          nh: Vlan3101
      BLU:
        0.0.0.0/0:
          rtype: static
          nh: 10.1.100.1
        10.251.32.0/19:
          rtype: bgp-65301 external
          nh: 192.168.2.57
        10.253.1.16/28:
          rtype: ospf-BLU1 nssa
          nh: 192.168.11.3
        10.253.1.32/28:
