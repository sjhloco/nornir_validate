  system:
  #   # Software image: The current software image running on the device
    # image: 
    #   version: 15.2(7)E2
  #   ## Management ACL (strict): ACL defining SSH access (also http for ASA) to the device (non-ASA must extended ACLs with 'IP' protocol destination 'any' - Not WLC
    # mgmt_acl:
      # - name: TEST_SSH_ACCESS
      #   ace:
      #     - { remark: MGMT Access - VLAN10 }
      #     - { permit: 10.17.10.0/24 }
      #     - { remark: Citrix Access }
      #     - { permit: 10.10.10.10/32 }
      #     - { deny: any }
      # - name: TEST_SSH_ACCESS1
      #   ace:
      #     - { remark: MGMT Access - VLAN10 }
      #     - { permit: any }
    mgmt_acl:
      - name: ssh
        ace:
          - { permit: 10.17.10.0/24 }
          - { permit: 10.10.10.10/32 }
      - name: http
        ace:
          - { permit: any }


