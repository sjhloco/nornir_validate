- show access-lists TEST_SNMP_ACCESS:
    TEST_SNMP_ACCESS:
      _mode: strict
      '20':
        action: permit
        protocol: ip
        src: 10.17.10.0/24
        dst: any
      '40':
        action: permit
        protocol: ip
        src: 10.10.10.10/32
        dst: any
      '50':
        action: deny
        protocol: ip
        src: any
        dst: any
