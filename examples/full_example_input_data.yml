        intf: Tu11
    # AC_VPN: show crypto session brief - {user: {group_policy: x, tunnel_group: x, bytes_tx: x, bytes_rx: x}}    !!!! NEW for asa
    ac_clients: 

    # NUM_VPN: {ac: xx, sts: xx} !!!! NEW for asa and possibily IOS-XE
    vpn_count: x
  # ----------------------------------------------------------------------------
  # Switchport authentication Validations - IOS/IOS-XE
  # ----------------------------------------------------------------------------
  sessions:
    ## MAB auth sessions -  Total number of MAB authenticated sessions
    mab_count: 21
    ## DOT1X auth sessions -  Total number of DOT1X authenticated sessions
    dot1x_count: 22
    # NUM_CONN: {total_conn: x}                                                                !!!! NEW for asa
    fw_conns: x 
    # NUM_CLIENTS: {total: x, wlan: x}                                               !!!! NEW for wlc
    wifi_clients: x

  

  wifi:
     # WLAN: {wlan: {profile: x, intf: x, ssid: x, status: Enabled}}
     wlan: x
     # AP_IMAGE and summary  {ap: {primary_image: x, primary_image: x, model: x, ip: x, client_count: x, 
    ap: x
    # AP_SUMMARY: {ap: {primary_image: x, primary_image: x}}
     # FLEX_GTP: {grp_name: ap_count}
    flexconn: x
















